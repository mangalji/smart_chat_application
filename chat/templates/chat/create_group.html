{% extends "base.html" %}
{% block title %}New group — SmartChat{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Create a group</h1>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            {{ form.name.label_tag }}
            {{ form.name.errors }}
            {{ form.name }}
          </div>
          <button type="submit" class="btn btn-primary">Create &amp; open</button>
          <a href="{% url 'chat:inbox' %}" class="btn btn-link">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
