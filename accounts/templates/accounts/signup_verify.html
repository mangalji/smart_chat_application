{% extends "base.html" %}
{% block title %}Verify email — SmartChat{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Enter verification code</h1>
        <p class="text-muted small">Code sent to <strong>{{ email }}</strong></p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            {{ form.code.label_tag }}
            {{ form.code.errors }}
            {{ form.code }}
          </div>
          <button type="submit" class="btn btn-primary w-100">Verify &amp; create account</button>
        </form>
        <p class="mt-3 mb-0 small"><a href="{% url 'accounts:signup' %}">Start over</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
