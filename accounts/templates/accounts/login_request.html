{% extends "base.html" %}
{% block title %}Log in — SmartChat{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Log in</h1>
        <p class="text-muted small">We will email a one-time login code (console in development).</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            {{ form.email.label_tag }}
            {{ form.email.errors }}
            {{ form.email }}
          </div>
          <button type="submit" class="btn btn-primary w-100">Send login code</button>
        </form>
        <p class="mt-3 mb-0 small"><a href="{% url 'accounts:signup' %}">Need an account? Sign up</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
